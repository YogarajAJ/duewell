  <!-- calendar tabs -->
  <rect x="197" y="146" width="20" height="44" rx="10" fill="#ffffff"/>
  <rect x="295" y="146" width="20" height="44" rx="10" fill="#ffffff"/>

  <!-- calendar card -->
